name: Release

# Trigger:
#   - tag push matching v* (e.g. `git tag v1.0.1 && git push --tags`)
#   - manual workflow_dispatch (does NOT publish a release; uploads as run artifacts only)
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Required for tauri-action to create / update a GitHub Release.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os-label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14: GitHub-hosted M1 runner, free for public repos.
          # Builds aarch64-apple-darwin → .app + .dmg.
          - platform: macos-14
            os-label: macOS (Apple Silicon)
            pre-build: bash scripts/bundle-tooling-macos.sh
            install-deps: |
              brew install --cask android-platform-tools
              brew install libimobiledevice

          # windows-latest: GitHub-hosted Windows x64, free for public repos.
          # Builds x86_64-pc-windows-msvc → .exe (NSIS installer).
          - platform: windows-latest
            os-label: Windows (x64)
            pre-build: powershell -ExecutionPolicy Bypass -NoProfile -File scripts/bundle-tooling-windows.ps1
            install-deps: ''

    runs-on: ${{ matrix.platform }}

    steps:
      # All third-party actions pinned to immutable commit SHAs (workflow has
      # contents: write, so unverified upstream changes could leak into release
      # artifacts). Tag references kept in trailing comments for readability.
      # Bump these via Dependabot or manually with `gh api repos/<a>/<r>/commits/<tag>`.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install platform tooling
        if: matrix.install-deps != ''
        run: ${{ matrix.install-deps }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri

      # Vendor adb + libimobiledevice into src-tauri/vendor/<triple>/ so
      # `cargo tauri build` can pick them up via tauri.<platform>.conf.json's
      # bundle.resources glob. Must run BEFORE tauri-action — the action does
      # not expose a preBuildCommand input and ignores it with a warning.
      #
      # First Windows run will fail because SHA-256 hashes for the downloaded
      # adb / libimobiledevice archives ship as placeholder zeros (see
      # src-tauri/scripts/bundle-tooling-windows.ps1). Bootstrap procedure:
      #   1. Set repo variable BUNDLER_TRUST_ON_FIRST_USE=1 (Settings →
      #      Secrets and variables → Actions → Variables).
      #   2. Trigger workflow_dispatch — script prints computed hashes via
      #      Write-Warning in the job log.
      #   3. Copy hashes into the script's $script:AdbZipSha256 /
      #      $script:ImdZipSha256, commit, push.
      #   4. Unset the variable. Future builds verify against committed hashes.
      - name: Vendor platform tooling
        working-directory: src-tauri
        env:
          APPLOGS_BUNDLER_TRUST_ON_FIRST_USE: ${{ vars.BUNDLER_TRUST_ON_FIRST_USE || '0' }}
        run: ${{ matrix.pre-build }}

      # Two mutually exclusive build paths so release publishing is
      # explicitly gated on tag refs.
      - name: Build + publish Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: AppLogsViewer ${{ github.ref_name }}
          releaseBody: |
            See [README](https://github.com/${{ github.repository }}#install) for install instructions.

            **First launch (unsigned build):**
            - macOS: right-click `.app` → **Open** → **Open** to bypass Gatekeeper once.
            - Windows: SmartScreen warns → **More info** → **Run anyway** once.

            iOS support on Windows additionally requires [Apple Devices](https://apps.microsoft.com/detail/9NP83LWLPZ9K) from the Microsoft Store.
          releaseDraft: false
          prerelease: false

      - name: Build artifacts (workflow_dispatch — no Release published)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0
        # No GITHUB_TOKEN: this path must never reach the Releases API.
        with:
          projectPath: src-tauri

      - name: Upload dispatch artifacts to run page
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: applogs-viewer-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
